version: '3.8'

services:
  mysqldb:
    image: mysql:8.0
    container_name: elibrary-mysql
    restart: always
    environment:
      MYSQL_DATABASE: "elibrary"
      MYSQL_ROOT_PASSWORD: "Som1234567"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pSom1234567"]
      interval: 10s
      timeout: 5s
      retries: 5

  web-app:
    image: somnath020/my-app:latest
    container_name: my-running-app
    restart: always
    ports:
      - "8087:8087"
    depends_on:
      mysqldb:
        condition: service_healthy
    environment:
      SERVER_PORT: 8087
      MYSQL_HOST: mysqldb
      MYSQL_DATABASE: elibrary
      MYSQL_USER: root
      MYSQL_PASSWORD: Som1234567
      # Added standard Spring Boot database link strings
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysqldb:3306/elibrary?allowPublicKeyRetrieval=true&useSSL=false"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "Som1234567"

volumes:
  mysql-data:
