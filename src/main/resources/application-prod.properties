
# ===================================================================
# Spring Application Settings
# ===================================================================
spring.application.name=elibrary
spring.profiles.active=dev

# ===================================================================
# Server Port & Network Binding Configuration (CRUCIAL FOR DOCKER)
# ===================================================================
server.port=${SERVER_PORT:8087}
# Forces Spring Boot to bind to all network interfaces inside the container
server.address=0.0.0.0

# ===================================================================
# Database Configuration (MySQL Container Link)
# ===================================================================
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DATABASE:elibrary}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Som1234567}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Tuning for Stability
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===================================================================
# JPA / Hibernate Settings
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Uses modern dialect for compatibility with MySQL 8.0+
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===================================================================
# Logging Configuration (Fixed Syntax Error)
# ===================================================================
logging.file.name=logs/app-error.log
logging.level.root=INFO
# Fixed: Removed the broken "://" prefix which crashes Spring Boot property parsers
://level.com.library.repository.app.elibrary=DEBUG

# Log Rotation Policies
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.total-size-cap=1GB
logging.logback.rollingpolicy.max-history=7

# ===================================================================
# Actuator Management Endpoints
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics
