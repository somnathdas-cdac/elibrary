<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <title>Book Directory</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        .alphabet-container { margin-bottom: 20px; }
        .letter-link { display: inline-block; padding: 8px 12px; margin-right: 5px; background-color: #f0f0f0; text-decoration: none; color: #333; border: 1px solid #ccc; border-radius: 4px; }
        .letter-link:hover { background-color: #ddd; }
        .active-letter { background-color: #007bff; color: white; border-color: #007bff; }
        .active-letter:hover { background-color: #007bff; }
        table { width: 100%; border-collapse: collapse; margin-top: 100px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
       
       
        /*  Layout additions for side-by-side forms matching the wireframe */
        .forms-wrapper {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: start;
            gap: 20px;
            margin: 30px 0;
            max-width: 800px;
        }
        .search-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .form-label {
            font-size: 14px;
            font-weight: bold;
            color: #555;
        }
        .search-box {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 2px solid #333;
            border-radius: 4px;
        }
        .search-btn {
            padding: 8px 15px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
        }
        .search-btn:hover {
            background-color: #ddd;
        }
        .vertical-divider {
            width: 2px;
            background-color: #000;
            align-self: stretch;
            min-height: 120px;
        } 
        
        
        
        
        
        
    </style>
</head>
<body>
    
    
      <!-- 1. Insert Header -->
    <div th:replace="~{fragments/header :: header-panel}"></div>
    
     <!-- 2. Insert Left Sidebar Panel -->
    <div th:replace="~{fragments/sidebar :: sidebar-panel}"></div>




	 <main style="margin-left: 280px; padding: 15px;">
     

    <h2>Book Directory Search</h2>

    <!-- A to Z Navigation Links -->
    <div class="alphabet-container">
        <a href="/books" class="letter-link" th:classappend="${selectedLetter == null} ? 'active-letter'">All</a>
        
        <a th:each="l : ${alphabet}" 
           th:href="@{/books(letter=${l})}" 
           th:text="${l}"
           class="letter-link"
           th:classappend="${selectedLetter == l} ? 'active-letter'">
        </a>
    </div>

    <h3 th:if="${selectedLetter}" th:text="'Results starting with: ' + ${selectedLetter}"></h3>
    
   
	 <div class="forms-wrapper">
       
        <!-- Left Side: Title Form -->
        <div class="search-column">
        
        
            <span class="form-label">Search By Title</span>
            <form name="titleSearchForm" th:action="@{/books/search/title}" th:object="${book}" method="post">
                <div>
                    <input type="text" th:field="*{title}" class="search-box" placeholder="Search by Book Title...">
                </div>
                <div style="margin-top: 10px;">
                    <button type="submit" class="search-btn">Submit</button>
                </div>
            </form>
        </div>

        <!-- Middle Element: Black Vertical Partition Line -->
        <div class="vertical-divider"></div>

        <!-- Right Side: Author Form -->
        <div class="search-column">
        
            <span class="form-label">Search By Author</span>
            <form name="authorSearchForm" th:action="@{/books/search/author}" th:object="${book}" method="post">
                <div>
                    <input type="text" th:field="*{author}" class="search-box" placeholder="Search by Author Name...">
                </div>
                <div style="margin-top: 10px;">
                    <button type="submit" class="search-btn">Submit</button>
                </div>
            </form>
        </div>

    </div>







    
    
    
    
    

    <!-- Results Table -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Book Title</th>
                <th>Author</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.id}">1</td>
                <td th:text="${book.title}">Book Title</td>
                <td th:text="${book.author}">Author Name</td>
            </tr>
            <tr th:if="${#lists.isEmpty(books)}">
                <td colspan="3" style="text-align: center; color: #777;">No books found starting with this letter.</td>
            </tr>
        </tbody>
    </table>
    
    
    
     </main>
    
    <div th:replace="~{fragments/footer :: footer-panel}"></div>

</body>
</html>
