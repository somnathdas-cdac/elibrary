spring.application.name=elibrary



spring.datasource.url=jdbc:mysql://localhost:3306/elibrary
spring.datasource.username=root
spring.datasource.password=Som1234567


# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Exposes all actuator endpoints, including /beans
#management.endpoints.web.exposure.include=*

# for the profile
spring.profiles.active=dev


#############################################Log######################

# 1. Specify the name and location of the log file
logging.file.name=logs/app-error.log

# 2. Control how much detail you want to see (TRACE, DEBUG, INFO, WARN, ERROR)
logging.level.root=INFO
logging.level.com.library.repository.app.elibrary=DEBUG


# 3. Automatically split files when they grow too large (Log Rotation)
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.total-size-cap=1GB
logging.logback.rollingpolicy.max-history=7

#####################################################################

# Expose all endpoints (use sparingly in production)
management.endpoints.web.exposure.include=*

# Or expose specific endpoints
# management.endpoints.web.exposure.include=health,info,metrics

#####################################################################

